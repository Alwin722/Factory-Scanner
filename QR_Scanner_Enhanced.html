<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Factory QR Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.4/jsQR.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface2: #1f1f1f;
            --border: #2a2a2a;
            --accent: #00e5a0;
            --accent-dim: rgba(0,229,160,0.12);
            --accent-glow: rgba(0,229,160,0.35);
            --danger: #ff4d4d;
            --warn: #ffb800;
            --text: #e8e8e8;
            --text-dim: #777;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .header-icon {
            width: 40px; height: 40px;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .header h1 {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.04em;
        }
        .header p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .badge {
            margin-left: auto;
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
        }
        .card-title {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* Camera area */
        .camera-wrap {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 10px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .camera-placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px;
            color: var(--text-dim);
            font-size: 13px;
        }
        .camera-placeholder .cam-icon { font-size: 40px; opacity: 0.3; }

        /* Scan overlay */
        .scan-overlay {
            position: absolute; inset: 0;
            display: none;
            align-items: center; justify-content: center;
            pointer-events: none;
        }
        .scan-overlay.active { display: flex; }
        .scan-box {
            width: 55%; aspect-ratio: 1;
            border: 2px solid var(--accent);
            border-radius: 6px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.35);
            position: relative;
        }
        .scan-box::before, .scan-box::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px;
            width: 20px; height: 20px;
            border-top: 3px solid var(--accent);
            border-left: 3px solid var(--accent);
        }
        .scan-box::after {
            top: auto; left: auto;
            bottom: -2px; right: -2px;
            border-top: none; border-left: none;
            border-bottom: 3px solid var(--accent);
            border-right: 3px solid var(--accent);
        }
        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanline 2s linear infinite;
        }
        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Flash on success */
        .flash {
            position: absolute; inset: 0;
            background: var(--accent);
            opacity: 0;
            border-radius: 8px;
            pointer-events: none;
            transition: opacity 0.05s;
        }
        .flash.pop { opacity: 0.35; }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--surface2);
            border-radius: 6px;
            font-family: var(--mono);
            font-size: 12px;
            margin-bottom: 10px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
        }
        .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
        .status-dot.warn { background: var(--warn); }
        .status-dot.success { background: var(--accent); animation: pulse 0.5s ease-out; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.6); } }
        #statusText { color: var(--text-dim); flex: 1; }

        /* Enhancement toggle */
        .enhance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .enhance-label {
            font-size: 12px;
            color: var(--text-dim);
        }
        .enhance-label span {
            display: block;
            font-size: 11px;
            color: #444;
            margin-top: 1px;
        }
        .toggle {
            position: relative;
            width: 40px; height: 22px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .slider::before {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            left: 3px; top: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .slider { background: var(--accent); }
        .toggle input:checked + .slider::before { transform: translateX(18px); }

        /* Camera controls */
        .cam-controls {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 10px 16px;
            font-size: 13px;
            font-family: var(--sans);
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #000; flex: 1; }
        .btn-primary:hover { background: #00ffb3; }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: rgba(255,77,77,0.15); color: var(--danger); border: 1px solid rgba(255,77,77,0.3); }
        .btn-danger:hover { background: rgba(255,77,77,0.25); }
        .btn-success { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); flex: 1; }
        .btn-success:hover { background: rgba(0,229,160,0.2); }
        .btn-torch { background: var(--surface2); color: var(--warn); border: 1px solid rgba(255,184,0,0.3); }
        .btn-torch.on { background: rgba(255,184,0,0.15); border-color: var(--warn); box-shadow: 0 0 8px rgba(255,184,0,0.3); }
        .btn-torch:hover { border-color: var(--warn); }
        .btn[disabled] { opacity: 0.4; cursor: not-allowed; }

        /* Manual entry */
        .input-row {
            display: flex;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            font-size: 14px;
            font-family: var(--mono);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="text"]::placeholder { color: #444; }
        input[type="text"]:focus { border-color: var(--accent); }

        /* Counter */
        .counter-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .counter-num {
            font-family: var(--mono);
            font-size: 52px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
        }
        .counter-meta {
            text-align: right;
        }
        .counter-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .last-scan {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .last-scan.new { color: var(--accent); }

        /* Items list */
        #itemsList {
            max-height: 280px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .empty-msg {
            text-align: center;
            color: #444;
            padding: 24px;
            font-size: 13px;
            font-family: var(--mono);
        }
        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface2);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 3px solid var(--accent);
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .item-num {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            min-width: 28px;
        }
        .item-id {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .item-time {
            font-size: 11px;
            color: #444;
            white-space: nowrap;
        }
        .item-del {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            font-size: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.15s;
            line-height: 1;
        }
        .item-del:hover { color: var(--danger); background: rgba(255,77,77,0.1); }

        /* Bottom actions */
        .action-row {
            display: flex;
            gap: 8px;
        }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-icon">🏭</div>
        <div>
            <h1>FACTORY QR SCANNER</h1>
            <p>Enhanced with image processing</p>
        </div>
        <div class="badge" id="enhBadge">ENH ON</div>
    </div>

    <!-- Camera -->
    <div class="card">
        <div class="card-title">📷 Scanner</div>

        <div class="camera-wrap" id="cameraWrap">
            <video id="camera" autoplay playsinline muted></video>
            <div class="camera-placeholder" id="camPlaceholder">
                <div class="cam-icon">📷</div>
                <div>Tap Start Camera to begin</div>
            </div>
            <div class="scan-overlay" id="scanOverlay">
                <div class="scan-box">
                    <div class="scan-line"></div>
                </div>
            </div>
            <div class="flash" id="flash"></div>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <div id="statusText">Camera off</div>
        </div>

        <div class="cam-controls">
            <button class="btn btn-primary" id="cameraBtn" onclick="startCamera()">▶ Start Camera</button>
            <button class="btn btn-secondary" id="stopBtn" onclick="stopCamera()" style="display:none">■ Stop</button>
            <button class="btn btn-torch" id="torchBtn" onclick="toggleTorch()" style="display:none" title="Toggle flashlight">🔦</button>
        </div>

        <div class="enhance-row">
            <div class="enhance-label">
                Image Enhancement
                <span>Contrast boost + adaptive threshold for faded codes</span>
            </div>
            <label class="toggle">
                <input type="checkbox" id="enhanceToggle" checked onchange="toggleEnhance()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- Counter -->
    <div class="card">
        <div class="counter-display">
            <div>
                <div class="card-title">📊 Total Scanned</div>
                <div class="counter-num" id="counter">0</div>
            </div>
            <div class="counter-meta">
                <div class="counter-label">Last scan</div>
                <div class="last-scan" id="lastScan">—</div>
            </div>
        </div>
    </div>

    <!-- Manual Entry -->
    <div class="card">
        <div class="card-title">✏️ Manual Entry</div>
        <div class="input-row">
            <input type="text" id="productInput" placeholder="Type product ID here..." onkeypress="if(event.key==='Enter') addProduct()">
            <button class="btn btn-secondary" onclick="addProduct()">Add</button>
        </div>
    </div>

    <!-- Items List -->
    <div class="card">
        <div class="card-title">📝 Scanned Items</div>
        <div id="itemsList"><div class="empty-msg">// no items scanned yet</div></div>
    </div>

    <!-- Download -->
    <div class="card">
        <div class="card-title">⬇️ Export</div>
        <div class="action-row">
            <button class="btn btn-success" onclick="downloadCSV()">↓ Download CSV</button>
            <button class="btn btn-danger" onclick="clearAll()">✕ Clear All</button>
        </div>
    </div>

</div>

<canvas id="canvas"></canvas>
<canvas id="enhCanvas"></canvas>

<script>
let items = [];
let cameraActive = false;
let animFrame;
let torchOn = false;
let torchTrack = null;
let enhanceEnabled = true;
let lastScannedCode = '';
let lastScannedTime = 0;
const COOLDOWN_MS = 2500; // prevent same code re-scanning

const camera   = document.getElementById('camera');
const canvas   = document.getElementById('canvas');
const enhCanvas = document.getElementById('enhCanvas');
const ctx      = canvas.getContext('2d');
const enhCtx   = enhCanvas.getContext('2d', { willReadFrequently: true });

function setStatus(msg, state) {
    document.getElementById('statusText').textContent = msg;
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function startCamera() {
    const constraints = {
        video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1920, min: 1280 },
            height: { ideal: 1080, min: 720 },
            focusMode: 'continuous',
            advanced: [{ focusMode: 'continuous' }]
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
            camera.srcObject = stream;
            torchTrack = stream.getVideoTracks()[0];
            camera.play();
            document.getElementById('camPlaceholder').style.display = 'none';
            document.getElementById('cameraBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('torchBtn').style.display = 'block';
            document.getElementById('scanOverlay').classList.add('active');
            cameraActive = true;
            setStatus('Scanning… point at QR code', 'active');
            animFrame = requestAnimationFrame(scanLoop);
        })
        .catch(err => {
            setStatus('Camera error: ' + err.message, 'warn');
        });
}

function stopCamera() {
    if (camera.srcObject) camera.srcObject.getTracks().forEach(t => t.stop());
    cameraActive = false;
    cancelAnimationFrame(animFrame);
    document.getElementById('camPlaceholder').style.display = 'flex';
    document.getElementById('cameraBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('torchBtn').style.display = 'none';
    document.getElementById('scanOverlay').classList.remove('active');
    torchOn = false;
    document.getElementById('torchBtn').classList.remove('on');
    setStatus('Camera off', '');
}

async function toggleTorch() {
    if (!torchTrack) return;
    torchOn = !torchOn;
    try {
        await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        document.getElementById('torchBtn').classList.toggle('on', torchOn);
    } catch(e) {
        setStatus('Torch not supported on this device', 'warn');
        torchOn = false;
    }
}

function toggleEnhance() {
    enhanceEnabled = document.getElementById('enhanceToggle').checked;
    document.getElementById('enhBadge').textContent = enhanceEnabled ? 'ENH ON' : 'ENH OFF';
    document.getElementById('enhBadge').style.opacity = enhanceEnabled ? '1' : '0.4';
}

// ── Image enhancement pipeline ────────────────────────────────────────────────
function enhanceFrame(srcCanvas) {
    const w = srcCanvas.width, h = srcCanvas.height;
    enhCanvas.width = w;
    enhCanvas.height = h;

    // 1. Draw original
    enhCtx.drawImage(srcCanvas, 0, 0);
    const imgData = enhCtx.getImageData(0, 0, w, h);
    const d = imgData.data;

    // 2. Grayscale + contrast stretch + sharpen
    const gray = new Uint8Array(w * h);

    // Pass 1: convert to grayscale
    for (let i = 0; i < w * h; i++) {
        const r = d[i*4], g = d[i*4+1], b = d[i*4+2];
        gray[i] = Math.round(0.299*r + 0.587*g + 0.114*b);
    }

    // Pass 2: find min/max for contrast stretch
    let mn = 255, mx = 0;
    for (let i = 0; i < gray.length; i++) {
        if (gray[i] < mn) mn = gray[i];
        if (gray[i] > mx) mx = gray[i];
    }
    const range = mx - mn || 1;

    // Pass 3: stretch contrast + unsharp mask (simple)
    const sharpened = new Uint8Array(w * h);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            // Contrast stretch
            let val = Math.round(((gray[idx] - mn) / range) * 255);
            // Unsharp mask: subtract blurred neighbor
            let blur = 0, cnt = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = x+dx, ny = y+dy;
                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                        blur += gray[(y+dy)*w+(x+dx)];
                        cnt++;
                    }
                }
            }
            blur = Math.round(((blur/cnt - mn) / range) * 255);
            val = Math.min(255, Math.max(0, val + 0.6 * (val - blur)));
            sharpened[idx] = val;
        }
    }

    // Pass 4: adaptive threshold (local mean, 15×15 window approximated by integral)
    // Simplified: use global Otsu-like threshold
    const hist = new Int32Array(256);
    for (let i = 0; i < sharpened.length; i++) hist[sharpened[i]]++;
    const total = sharpened.length;
    let sum = 0;
    for (let i = 0; i < 256; i++) sum += i * hist[i];
    let sumB = 0, wB = 0, threshold = 128, maxVar = 0;
    for (let t = 0; t < 256; t++) {
        wB += hist[t];
        if (!wB) continue;
        const wF = total - wB;
        if (!wF) break;
        sumB += t * hist[t];
        const mB = sumB / wB;
        const mF = (sum - sumB) / wF;
        const variance = wB * wF * (mB - mF) * (mB - mF);
        if (variance > maxVar) { maxVar = variance; threshold = t; }
    }

    // Write back as black/white
    for (let i = 0; i < w * h; i++) {
        const v = sharpened[i] < threshold ? 0 : 255;
        d[i*4] = d[i*4+1] = d[i*4+2] = v;
        d[i*4+3] = 255;
    }
    enhCtx.putImageData(imgData, 0, 0);
    return enhCtx.getImageData(0, 0, w, h);
}

// ── Main scan loop ────────────────────────────────────────────────────────────
function scanLoop() {
    if (!cameraActive) return;

    if (camera.readyState >= 2 && camera.videoWidth > 0) {
        const w = camera.videoWidth, h = camera.videoHeight;
        canvas.width = w; canvas.height = h;
        ctx.drawImage(camera, 0, 0);

        let code = null;

        // Attempt 1: raw frame
        const rawData = ctx.getImageData(0, 0, w, h);
        code = jsQR(rawData.data, w, h, { inversionAttempts: 'dontInvert' });

        // Attempt 2: enhanced frame (if enabled & attempt 1 failed)
        if (!code && enhanceEnabled) {
            const enhData = enhanceFrame(canvas);
            code = jsQR(enhData.data, enhCanvas.width, enhCanvas.height, { inversionAttempts: 'attemptBoth' });
        }

        // Attempt 3: inverted raw (for white-on-dark codes)
        if (!code) {
            code = jsQR(rawData.data, w, h, { inversionAttempts: 'onlyInvert' });
        }

        if (code && code.data) {
            const now = Date.now();
            const isDuplicate = code.data === lastScannedCode && (now - lastScannedTime) < COOLDOWN_MS;
            if (!isDuplicate) {
                lastScannedCode = code.data;
                lastScannedTime = now;
                onScanSuccess(code.data);
            }
        }
    }

    animFrame = requestAnimationFrame(scanLoop);
}

function onScanSuccess(text) {
    // Flash feedback
    const flash = document.getElementById('flash');
    flash.classList.add('pop');
    setTimeout(() => flash.classList.remove('pop'), 200);

    // Vibrate
    if (navigator.vibrate) navigator.vibrate(80);

    setStatus('✓ Scanned: ' + text, 'success');
    setTimeout(() => { if (cameraActive) setStatus('Scanning… point at QR code', 'active'); }, 1800);

    addProduct(text);
}

// ── Data functions ────────────────────────────────────────────────────────────
function addProduct(id) {
    id = id || document.getElementById('productInput').value.trim();
    if (!id) { alert('Please enter a product ID'); return; }

    const now = new Date();
    items.push({ id, timestamp: now.toLocaleString(), ts: now.getTime() });
    document.getElementById('productInput').value = '';

    // Update last scan display
    const ls = document.getElementById('lastScan');
    ls.textContent = id;
    ls.classList.add('new');
    setTimeout(() => ls.classList.remove('new'), 1500);

    updateDisplay();
}

function removeProduct(index) {
    items.splice(index, 1);
    updateDisplay();
}

function updateDisplay() {
    document.getElementById('counter').textContent = items.length;
    const list = document.getElementById('itemsList');
    if (!items.length) {
        list.innerHTML = '<div class="empty-msg">// no items scanned yet</div>';
        return;
    }
    list.innerHTML = [...items].reverse().map((item, ri) => {
        const i = items.length - 1 - ri;
        return `<div class="item">
            <div class="item-num">#${String(i+1).padStart(3,'0')}</div>
            <div class="item-id">${item.id}</div>
            <div class="item-time">${item.timestamp}</div>
            <button class="item-del" onclick="removeProduct(${i})" title="Remove">×</button>
        </div>`;
    }).join('');
}

function downloadCSV() {
    if (!items.length) { alert('No items to download'); return; }
    const csv = 'No,Product ID,Timestamp\n' +
        items.map((item, i) => `"${i+1}","${item.id}","${item.timestamp}"`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `factory_scan_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function clearAll() {
    if (confirm('Clear all scanned items?')) {
        items = [];
        lastScannedCode = '';
        document.getElementById('lastScan').textContent = '—';
        updateDisplay();
    }
}

updateDisplay();
</script>
</body>
</html>
